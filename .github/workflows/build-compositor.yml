name: Build & Push compositor image

# Builds the mxl-k8s compositor image and pushes it to GHCR under
# this repo's namespace. Mediamtx's existing ghcr-pull-secret (rendered
# by ExternalSecrets from AWS SM) covers pulls of this image too — same
# registry, same auth, so no extra secret to wire.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "compositor/**"
      - ".github/workflows/build-compositor.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/qvest-digital/mxl-dmf-demo-app/compositor

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image tags
        id: tags
        shell: bash
        run: |
          # sha tag always; version tag when building a v* release tag; latest on main.
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push (mxl-k8s)
        uses: docker/build-push-action@v6
        with:
          context: compositor
          file: compositor/Dockerfile.mxlk8s
          push: true
          tags: |
            ${{ env.IMAGE }}-mxlk8s:${{ steps.tags.outputs.sha }}
            ${{ steps.tags.outputs.version && format('{0}-mxlk8s:{1}', env.IMAGE, steps.tags.outputs.version) || '' }}
            ${{ github.ref == 'refs/heads/main' && format('{0}-mxlk8s:latest', env.IMAGE) || '' }}
          cache-from: type=gha,scope=mxlk8s
          cache-to: type=gha,scope=mxlk8s,mode=max
