name: Build & Push compositor image

# Builds the multi-flow MXL compositor image and pushes it to GHCR under
# this repo's namespace. Mediamtx's existing ghcr-pull-secret (rendered
# by ExternalSecrets from AWS SM) covers pulls of this image too — same
# registry, same auth, so no extra secret to wire.

on:
  push:
    branches: [main]
    paths:
      - "compositor/**"
      - ".github/workflows/build-compositor.yml"
  pull_request:
    branches: [main]
    paths:
      - "compositor/**"
      - ".github/workflows/build-compositor.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/qvest-digital/mxl-dmf-demo-app/compositor

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push (regular)
        uses: docker/build-push-action@v6
        with:
          context: compositor
          file: compositor/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # mxl-k8s-compatible variant: built on the go-mxl builder/runtime
      # images so the libmxl runtime matches the gateway (see
      # Dockerfile.mxlk8s). Published under the -mxlk8s suffix.
      - name: Build & push (mxl-k8s)
        uses: docker/build-push-action@v6
        with:
          context: compositor
          file: compositor/Dockerfile.mxlk8s
          push: true
          tags: |
            ${{ env.IMAGE }}-mxlk8s:${{ github.sha }}
            ${{ env.IMAGE }}-mxlk8s:latest
          cache-from: type=gha,scope=mxlk8s
          cache-to: type=gha,scope=mxlk8s,mode=max
