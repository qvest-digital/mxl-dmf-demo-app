name: Push manifests

# This repo no longer builds any image. mediamtx-mxl is published by
# qvest-digital/mediamtx CI (feature/mxl-static-source); libmxl is published
# by qvest-digital/mxl-dmf-demo CI. All we do here is render the k8s
# manifests and push them as an OCI artifact for Flux to reconcile.

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  push-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Flux CLI
        shell: bash
        run: curl -s https://fluxcd.io/install.sh | sudo bash

      - name: Stage manifests
        shell: bash
        run: |
          mkdir -p /tmp/k8s-rendered
          cp k8s/*.yaml /tmp/k8s-rendered/
          echo "=== Manifests ==="
          ls /tmp/k8s-rendered/

      - name: Push k8s manifests as OCI artifact
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          flux push artifact \
            "oci://${{ env.REGISTRY }}/qvest-digital/mxl-dmf-demo-app-manifests:${SHORT_SHA}" \
            --path="/tmp/k8s-rendered" \
            --source="$(git config --get remote.origin.url)" \
            --revision="${GITHUB_REF_NAME}@sha1:${GITHUB_SHA}" \
            --creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"

          flux tag artifact \
            "oci://${{ env.REGISTRY }}/qvest-digital/mxl-dmf-demo-app-manifests:${SHORT_SHA}" \
            --tag latest \
            --creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"

          echo "Pushed: mxl-dmf-demo-app-manifests:${SHORT_SHA}"
          echo "Tagged: mxl-dmf-demo-app-manifests:latest"
