name: Push manifests

# This repo no longer builds any image. mediamtx-mxl is published by
# qvest-digital/mediamtx CI (feature/mxl-static-source); libmxl is published
# by qvest-digital/mxl-dmf-demo CI. All we do here is render the k8s
# manifests and push them as an OCI artifact for Flux to reconcile.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    # Same code path as push: render the manifests + push them as an OCI
    # artifact tagged pr-<N> so terraform PR envs can repoint their
    # demo-app OCIRepository at the matching consumer-side spec.
    paths:
      - "k8s/**"
      - ".github/workflows/build.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  push-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Flux CLI
        shell: bash
        run: curl -s https://fluxcd.io/install.sh | sudo bash

      - name: Stage manifests
        shell: bash
        run: |
          mkdir -p /tmp/k8s-rendered
          # Copy the whole k8s/ tree (manifests + config/ subdir consumed
          # by kustomize configMapGenerator). A flat *.yaml glob would
          # silently drop config/, which then makes the kustomize build
          # in Flux fail with "no such file or directory".
          cp -R k8s/. /tmp/k8s-rendered/
          echo "=== Tree ==="
          find /tmp/k8s-rendered -type f | sort

      - name: Push k8s manifests as OCI artifact
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          REPO="${{ env.REGISTRY }}/qvest-digital/mxl-dmf-demo-app-manifests"

          flux push artifact \
            "oci://${REPO}:${SHORT_SHA}" \
            --path="/tmp/k8s-rendered" \
            --source="$(git config --get remote.origin.url)" \
            --revision="${GITHUB_REF_NAME}@sha1:${GITHUB_SHA}" \
            --creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"

          # main push → also :latest (default consumer ref).
          # PR        → also :pr-<N> so terraform PR envs can pin.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}"
          else
            TAG="latest"
          fi
          flux tag artifact \
            "oci://${REPO}:${SHORT_SHA}" \
            --tag "${TAG}" \
            --creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"

          echo "Pushed: mxl-dmf-demo-app-manifests:${SHORT_SHA}"
          echo "Tagged: mxl-dmf-demo-app-manifests:${TAG}"
