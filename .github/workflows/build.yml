name: Push manifests

# This repo no longer builds any image. mediamtx-mxl is published by
# qvest-digital/mediamtx CI (feature/mxl-static-source); libmxl is published
# by qvest-digital/mxl-dmf-demo CI. All we do here is render the k8s
# manifests and push them as an OCI artifact for Flux to reconcile.
#
# PR env integration (called by mxl-dmf-terraform cd-pr-feature-up.yml):
#   workflow_call with pr_env=pr-185 + ref=feature/my-feature
#   → checks out the feature branch, pushes manifests, tags as pr-185-latest

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    # Same code path as push: render the manifests + push them as an OCI
    # artifact tagged pr-<N> so terraform PR envs can repoint their
    # demo-app OCIRepository at the matching consumer-side spec.
    paths:
      - "k8s/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:
    inputs:
      pr_env:
        description: "PR env name (e.g. pr-185) — if set, builds from 'ref' and tags as <pr_env>-latest"
        required: false
        default: ""
      ref:
        description: "Git ref to checkout — only used when pr_env is set"
        required: false
        default: "main"
  workflow_call:
    inputs:
      pr_env:
        description: "PR env name (e.g. pr-185) — if set, builds from 'ref' and tags as <pr_env>-latest"
        required: false
        type: string
        default: ""
      ref:
        description: "Git ref to checkout — only used when pr_env is set"
        required: false
        type: string
        default: "main"

permissions:
  contents: read
  id-token: write # assume the AWS role for ECR push (OIDC)

env:
  # Manifests OCI lives in ECR alongside the platform + txdarwin artifacts,
  # so the showcase reconciles it with the existing ecr-pull secret (no extra
  # GHCR secret in flux-system). Container images stay on GHCR.
  AWS_REGION: eu-central-1
  REGISTRY: 720180693591.dkr.ecr.eu-central-1.amazonaws.com

jobs:
  push-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        shell: bash
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$REGISTRY"

      - name: Install Flux CLI
        shell: bash
        run: curl -s https://fluxcd.io/install.sh | sudo bash

      - name: Stage manifests
        shell: bash
        run: |
          mkdir -p /tmp/k8s-rendered
          # Copy the whole k8s/ tree (manifests + config/ subdir consumed
          # by kustomize configMapGenerator). A flat *.yaml glob would
          # silently drop config/, which then makes the kustomize build
          # in Flux fail with "no such file or directory".
          cp -R k8s/. /tmp/k8s-rendered/
          echo "=== Tree ==="
          find /tmp/k8s-rendered -type f | sort

      - name: Push k8s manifests as OCI artifact
        shell: bash
        env:
          PR_ENV: ${{ inputs.pr_env }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          REPO="${{ env.REGISTRY }}/mxl-dmf-demo-app-manifests"

          # flux authenticates from the docker config the ECR login wrote.
          flux push artifact \
            "oci://${REPO}:${SHORT_SHA}" \
            --path="/tmp/k8s-rendered" \
            --source="$(git config --get remote.origin.url)" \
            --revision="${GITHUB_REF_NAME}@sha1:${GITHUB_SHA}"

          echo "Pushed: mxl-dmf-demo-app-manifests:${SHORT_SHA}"

          if [ -n "$PR_ENV" ]; then
            # Called by terraform PR env — tag as <pr_env>-latest.
            flux tag artifact "oci://${REPO}:${SHORT_SHA}" --tag "${PR_ENV}-latest"
            echo "Tagged: mxl-dmf-demo-app-manifests:${PR_ENV}-latest"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            flux tag artifact "oci://${REPO}:${SHORT_SHA}" --tag "pr-${{ github.event.pull_request.number }}"
            echo "Tagged: mxl-dmf-demo-app-manifests:pr-${{ github.event.pull_request.number }}"
          elif [ "$GITHUB_REF_NAME" = "main" ]; then
            flux tag artifact "oci://${REPO}:${SHORT_SHA}" --tag "latest"
            echo "Tagged: mxl-dmf-demo-app-manifests:latest"
          else
            echo "Skipping tag — not on main and no pr_env set (branch: $GITHUB_REF_NAME)"
          fi
