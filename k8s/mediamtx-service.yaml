apiVersion: v1
kind: Service
metadata:
  name: mediamtx
  labels:
    app: mediamtx
spec:
  type: ClusterIP
  selector:
    app: mediamtx
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: webrtc
      port: 8889
      targetPort: 8889
    # RTSP for in-cluster ingest: the compositor and the txDarwin viewer
    # publish their encoded outputs to rtsp://mediamtx:8554/<path>. Public
    # ingress only proxies HTTP/HLS — RTSP stays internal.
    - name: rtsp
      port: 8554
      targetPort: 8554
    # Control API, used by the demo-metrics aggregator to add/remove per-flow
    # preview paths on demand. In-cluster only (caddy does not proxy it).
    - name: api
      port: 9997
      targetPort: 9997
