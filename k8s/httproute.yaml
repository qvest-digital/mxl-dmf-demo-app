apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-app
spec:
  parentRefs:
    - name: istio-ingressgateway
      namespace: istio-system
      sectionName: https
  hostnames:
    - ${demo_app_hostname}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mediamtx
          port: 80
