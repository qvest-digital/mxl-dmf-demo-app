apiVersion: v1
kind: ConfigMap
metadata:
  name: multiviewer
  labels:
    app: mediamtx
data:
  # Caddy config: serve the static multiviewer page at /, reverse-proxy
  # HLS requests at /hls/* to mediamtx on the same pod (localhost:8888),
  # and rewrite mediamtx's cookieCheck 302 Location headers so the
  # browser stays under our origin instead of getting redirected to the
  # mediamtx pod's internal path.
  Caddyfile: |
    {
      auto_https off
    }
    :8080 {
      encode gzip

      # handle / handle_path blocks are mutually exclusive and run in source
      # order, so this catches /healthz before the catch-all hits it. Plain
      # `respond /healthz` would be reordered late by Caddy and swallowed
      # by the file_server below.
      handle /healthz {
        respond "ok" 200
      }

      handle_path /hls/* {
        reverse_proxy http://localhost:8888 {
          header_down Location "^/(.*)$" "/hls/$1"
        }
      }

      handle {
        root * /srv
        file_server
      }
    }

  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
    <title>MULTIVIEWER</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #000; color: #ccc; font-family: "Menlo","Consolas","Courier New",monospace; font-size: 11px; overflow: hidden; }
      #bar { height: 22px; background: #0a0a0a; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; padding: 0 8px; text-transform: uppercase; letter-spacing: 1px; color: #888; }
      #bar .l, #bar .r { display: flex; gap: 16px; }
      #grid { position: absolute; top: 22px; left: 0; right: 0; bottom: 0; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 1px; background: #1a1a1a; }
      .tile { position: relative; background: #000; border: 1px solid transparent; overflow: hidden; }
      .tile.live  { border-color: #007a00; }
      .tile.err   { border-color: #aa0000; }
      .tile video { position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 18px); background: #000; object-fit: contain; }
      .num   { position: absolute; top: 2px; left: 4px; font-weight: bold; color: #fff; text-shadow: 1px 1px 0 #000; font-size: 12px; z-index: 2; }
      .stat  { position: absolute; top: 2px; right: 4px; font-weight: bold; font-size: 10px; padding: 0 4px; z-index: 2; text-shadow: 1px 1px 0 #000; }
      .stat.live { color: #00ff00; }
      .stat.con  { color: #ffaa00; }
      .stat.off  { color: #ff3030; }
      .umd   { position: absolute; bottom: 0; left: 0; right: 0; height: 18px; background: #111; border-top: 1px solid #222; padding: 0 6px; line-height: 18px; color: #00cc00; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 11px; }
    </style>
    </head>
    <body>
      <div id="bar">
        <div class="l"><span>MXL DMF MULTIVIEWER</span></div>
        <div class="r"><span id="clk">--:--:--</span></div>
      </div>
      <div id="grid"></div>

      <script>
        var sources = [
          { id: 'mxl',        n: 1, label: 'MXL LIVE',         url: '/hls/mxl-stream-native/index.m3u8' },
          { id: 'sintel',     n: 2, label: 'SINTEL',           url: '/hls/sintel/index.m3u8' },
          { id: 'froscon-1',  n: 3, label: 'FROSCON INIT',     url: '/hls/froscon-1/index.m3u8' },
          { id: 'froscon-2',  n: 4, label: 'FROSCON OPS',      url: '/hls/froscon-2/index.m3u8' },
          { id: 'bbb',        n: 5, label: 'BIG BUCK BUNNY',   url: '/hls/bbb/index.m3u8' },
          { id: 'tears',      n: 6, label: 'TEARS OF STEEL',   url: '/hls/tears/index.m3u8' },
          { id: 'caminandes', n: 7, label: 'LLAMA DRAMA',      url: '/hls/caminandes/index.m3u8' },
          { id: 'c3-gone',    n: 8, label: '33C3 KEYNOTE',     url: '/hls/c3-gone/index.m3u8' },
          { id: 'nasa-iss',   n: 9, label: 'NASA EARTH',       url: '/hls/nasa-iss/index.m3u8' }
        ];

        var grid = document.getElementById('grid');
        var clk  = document.getElementById('clk');

        function pad(n){ return n<10 ? '0'+n : ''+n; }
        function tick(){
          var d = new Date();
          clk.textContent = pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
        }
        setInterval(tick, 1000); tick();

        function mkTile(s){
          var t = document.createElement('div');
          t.className = 'tile';
          t.id = 't-'+s.id;
          t.innerHTML =
            '<span class="num">'+s.n+'</span>' +
            '<span class="stat con" id="st-'+s.id+'">CONN</span>' +
            '<video id="v-'+s.id+'" muted autoplay playsinline></video>' +
            '<div class="umd">'+s.n+'  '+s.label+'</div>';
          grid.appendChild(t);
        }

        function play(s){
          var tile  = document.getElementById('t-'+s.id);
          var video = document.getElementById('v-'+s.id);
          var stEl  = document.getElementById('st-'+s.id);
          if (!Hls.isSupported()) return;
          var hls = new Hls({ liveSyncDurationCount: 1, liveMaxLatencyDurationCount: 2, enableWorker: true, lowLatencyMode: true });
          hls.loadSource(s.url);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, function(){
            stEl.textContent = 'LIVE';
            stEl.className = 'stat live';
            tile.className = 'tile live';
            video.play();
          });
          hls.on(Hls.Events.ERROR, function(ev, data){
            if (!data.fatal) return;
            stEl.textContent = 'OFF';
            stEl.className = 'stat off';
            tile.className = 'tile err';
            setTimeout(function(){
              stEl.textContent = 'CONN';
              stEl.className = 'stat con';
              tile.className = 'tile';
              hls.loadSource(s.url);
            }, 5000);
          });
        }

        sources.forEach(mkTile);
        sources.forEach(play);
      </script>
    </body>
    </html>
