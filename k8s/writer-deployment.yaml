#
# MXL writers — one Deployment per flow, one writer container per pod, one
# v210 test-pattern flow per writer (flow d4d…000n = tile MXL-n). Writers
# spread across nodes via soft anti-affinity (comment at each Deployment);
# the compositor + mediamtx co-locate on one node, so a writer on another
# node reaches them as a cross-node RDMA mirror, while a writer that shares
# their node is read locally. The per-flow metrics panel shows each mirror's
# sourceNode, so the local-vs-RDMA distinction stays visible.
#
# Patterns are set per writer via MXL_FLOW_PATTERN. An earlier 1080p setup
# could not run animated videotestsrc patterns (snow, ball, zone-plate hung
# the testsrc at v210 1080p); at the current 720p geometry they work —
# MXL-2 runs ball.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: writer-mxl-1
  labels:
    app: writer-mxl-1
    mxl.qvest-digital.com/role: producer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: writer-mxl-1
  template:
    metadata:
      labels:
        app: writer-mxl-1
        mxl-metrics: "true"
        mxl.qvest-digital.com/role: producer
    spec:
      # Spread writers across nodes with a soft rule instead of hostname
      # pinning (hostnames differ per cluster). On a 4-node cluster each
      # writer gets its own node, one flow per node, which the stock gateway
      # mirrors cleanly; on a 2-node cluster (EKS) they pack and still
      # schedule.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    mxl.qvest-digital.com/role: producer
                topologyKey: kubernetes.io/hostname
      tolerations:
        - key: "vpc.amazonaws.com/efa"
          operator: "Exists"
          effect: "NoSchedule"
      imagePullSecrets:
        - name: demo-app-ghcr-pull
      initContainers:
        - name: prepare-domain
          image: busybox:1.36
          env:
            - name: MXL_FLOW_ID
              value: d4d00000-0000-0000-0000-000000000001
          command:
            - sh
            - -c
            - |
              set -eu
              chmod 0777 /run/mxl/domain
              rm -rf "/run/mxl/domain/$MXL_FLOW_ID"*
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: mxl-domain
              mountPath: /run/mxl/domain
      containers:
        - name: writer-container
          image: ghcr.io/qvest-digital/mxl-dmf-writer:e5cf194066bf509a55409c367940206ff4b7024c
          imagePullPolicy: IfNotPresent
          env:
            - name: MXL_FLOW_ID
              value: d4d00000-0000-0000-0000-000000000001
            - name: MXL_FLOW_PATTERN
              value: smpte
            - name: MXL_FLOW_OVERLAY
              value: MXL-1
            # All tiles blend overlays directly on 10-bit packed v210 at 720p
            # (MXL_OVERLAY_FORMAT=v210), not the I420 fast path.
            - name: MXL_OVERLAY_FORMAT
              value: v210
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              FLOW_JSON=/tmp/flow-$MXL_FLOW_ID.json
              sed "s|5fbec3b1-1b0f-417d-9059-8b94a47197ed|$MXL_FLOW_ID|g" \
                  /home/mxl/v210_flow.json > "$FLOW_JSON"
              echo "starting testsrc UUID=$MXL_FLOW_ID pattern=$MXL_FLOW_PATTERN overlay=$MXL_FLOW_OVERLAY"
              exec /usr/bin/mxl-gst-testsrc \
                  -d /run/mxl/domain \
                  -v "$FLOW_JSON" \
                  -p "$MXL_FLOW_PATTERN" \
                  -t "$MXL_FLOW_OVERLAY" \
                  -g "mxl-multiviewer-1"
          securityContext:
            capabilities:
              add: ["IPC_LOCK", "SYS_RESOURCE"]
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: mxl-domain
              mountPath: /run/mxl/domain
      volumes:
        - name: mxl-domain
          hostPath:
            path: /run/mxl/domain
            type: DirectoryOrCreate
---
