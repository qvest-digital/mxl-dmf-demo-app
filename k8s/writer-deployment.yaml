#
# MXL writers — one Deployment per flow, one writer container per pod, one
# v210 static-pattern flow per writer. Each writer is pinned to the node whose
# index matches its tile (MXL-n -> n0n) via nodeSelector, so placement is
# deterministic and the kill-and-recover demo is predictable.
#
# Consumer note: the compositor + mediamtx are pinned to n01 (there is no
# writer-free node on a 4-node cluster with 4 pinned writers), so flow 1
# (MXL-1, on n01) is read locally while flows 2-4 are mirrored cross-node over
# RDMA. The per-flow metrics panel shows each flow's mirror sourceNode, so the
# local-vs-RDMA distinction is visible.
#
# Patterns are STATIC (smpte/smpte75/smpte100/gradient): animated videotestsrc
# patterns (snow, ball, zone-plate, ...) hang the testsrc at v210 1080p and
# freeze the tile. Keep these static.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: writer-mxl-1
  labels:
    app: writer-mxl-1
    mxl.qvest-digital.com/role: producer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: writer-mxl-1
  template:
    metadata:
      labels:
        app: writer-mxl-1
        mxl-metrics: "true"
        mxl.qvest-digital.com/role: producer
    spec:
      nodeSelector:
        kubernetes.io/hostname: n01
      tolerations:
        - key: "vpc.amazonaws.com/efa"
          operator: "Exists"
          effect: "NoSchedule"
      imagePullSecrets:
        - name: demo-app-ghcr-pull
      initContainers:
        - name: prepare-domain
          image: busybox:1.36
          env:
            - name: MXL_FLOW_ID
              value: d4d00000-0000-0000-0000-000000000001
          command:
            - sh
            - -c
            - |
              set -eu
              chmod 0777 /run/mxl/domain
              rm -rf "/run/mxl/domain/$MXL_FLOW_ID"*
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: mxl-domain
              mountPath: /run/mxl/domain
      containers:
        - name: writer-container
          image: ghcr.io/qvest-digital/mxl-dmf-writer:85674165d5ea94ff4f67fcd509584537d4a795a7
          imagePullPolicy: IfNotPresent
          env:
            - name: MXL_FLOW_ID
              value: d4d00000-0000-0000-0000-000000000001
            - name: MXL_FLOW_PATTERN
              value: smpte
            - name: MXL_FLOW_OVERLAY
              value: MXL-1
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              FLOW_JSON=/tmp/flow-$MXL_FLOW_ID.json
              sed "s|5fbec3b1-1b0f-417d-9059-8b94a47197ed|$MXL_FLOW_ID|g" \
                  /home/mxl/v210_flow.json > "$FLOW_JSON"
              echo "starting testsrc UUID=$MXL_FLOW_ID pattern=$MXL_FLOW_PATTERN overlay=$MXL_FLOW_OVERLAY"
              exec /usr/bin/mxl-gst-testsrc \
                  -d /run/mxl/domain \
                  -v "$FLOW_JSON" \
                  -p "$MXL_FLOW_PATTERN" \
                  -t "$MXL_FLOW_OVERLAY" \
                  -g "mxl-multiviewer-1"
          securityContext:
            capabilities:
              add: ["IPC_LOCK", "SYS_RESOURCE"]
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: mxl-domain
              mountPath: /run/mxl/domain
      volumes:
        - name: mxl-domain
          hostPath:
            path: /run/mxl/domain
            type: DirectoryOrCreate
