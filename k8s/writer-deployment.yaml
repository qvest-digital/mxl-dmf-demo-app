#
# MXL writers — one Deployment per flow, one writer container per pod,
# one v210 test-pattern flow per writer. Each pod produces a single flow
# into the per-node MXL domain at /run/mxl/domain; the mxl-k8s gateway
# DaemonSet mirrors it cross-node over RDMA (verbs) to the consumer
# (composite + mediamtx), so every tile in the 2x2 multiviewer is a
# distinct producer pod exercising the cross-node fabric.
#
# Scheduling:
#   - requiredAntiAffinity vs role=consumer keeps every writer OFF the
#     composite/mediamtx node, so all four flows must be RDMA-mirrored
#     (none are read locally).
#   - preferredAntiAffinity vs role=producer spreads the writers across
#     the remaining nodes when capacity allows.
# Apply the consumer (composite/mediamtx) first so it claims its node
# before the writers fill the others.
#
# Adding/removing a flow: add/remove a Deployment here and the matching
# MxlReceiver in mxl-receivers.yaml, then bump MXL_FLOW_IDS on the
# compositor. Flows 1-4 == a1000000-...-0001 .. 0004 == tiles MXL-1..4.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: writer-mxl-1
  labels:
    app: writer-mxl-1
    mxl.qvest-digital.com/role: producer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: writer-mxl-1
  template:
    metadata:
      labels:
        app: writer-mxl-1
        mxl-metrics: "true"
        mxl.qvest-digital.com/role: producer
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  mxl.qvest-digital.com/role: consumer
              topologyKey: kubernetes.io/hostname
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    mxl.qvest-digital.com/role: producer
                topologyKey: kubernetes.io/hostname
      tolerations:
        - key: "vpc.amazonaws.com/efa"
          operator: "Exists"
          effect: "NoSchedule"
      imagePullSecrets:
        - name: demo-app-ghcr-pull
      initContainers:
        # Make the shared per-node domain world-writable (gateway + agent
        # co-tenants run as non-1000 uids) and wipe only THIS writer's
        # stale flow dir so a previous incarnation's on-disk ABI can't be
        # reused. Never blanket-rm the domain — that strands co-tenant
        # mirror handles.
        - name: prepare-domain
          image: busybox:1.36
          env:
            - name: MXL_FLOW_ID
              value: a1000000-0000-0000-0000-000000000001
          command:
            - sh
            - -c
            - |
              set -eu
              chmod 0777 /run/mxl/domain
              rm -rf "/run/mxl/domain/$MXL_FLOW_ID"*
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: mxl-domain
              mountPath: /run/mxl/domain
      containers:
        - name: writer-container
          image: ghcr.io/qvest-digital/mxl-dmf-writer:476db9b6d6df66a7991f687c86e8948620aefef7
          imagePullPolicy: IfNotPresent
          env:
            - name: MXL_FLOW_ID
              value: a1000000-0000-0000-0000-000000000001
            - name: MXL_FLOW_PATTERN
              value: smpte
            - name: MXL_FLOW_OVERLAY
              value: MXL-1
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              FLOW_JSON=/tmp/flow-$MXL_FLOW_ID.json
              sed "s|5fbec3b1-1b0f-417d-9059-8b94a47197ed|$MXL_FLOW_ID|g" \
                  /home/mxl/v210_flow.json > "$FLOW_JSON"
              echo "starting testsrc UUID=$MXL_FLOW_ID pattern=$MXL_FLOW_PATTERN overlay=$MXL_FLOW_OVERLAY"
              exec /usr/bin/mxl-gst-testsrc \
                  -d /run/mxl/domain \
                  -v "$FLOW_JSON" \
                  -p "$MXL_FLOW_PATTERN" \
                  -t "$MXL_FLOW_OVERLAY" \
                  -g "mxl-multiviewer-1"
          securityContext:
            capabilities:
              add: ["IPC_LOCK", "SYS_RESOURCE"]
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: mxl-domain
              mountPath: /run/mxl/domain
      volumes:
        - name: mxl-domain
          hostPath:
            path: /run/mxl/domain
            type: DirectoryOrCreate
---
