apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediamtx
  labels:
    app: mediamtx
spec:
  replicas: 1
  # Recreate: hostPath ties the pod to a specific node, and we co-locate with
  # the reader-media-function-efa pod which itself uses `strategy: Recreate`
  # for the same reason. A rolling update would briefly schedule two pods
  # against the same hostPath on the same node — harmless for the read side,
  # but keeps the topology tidy.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mediamtx
  template:
    metadata:
      labels:
        app: mediamtx
    spec:
      # Co-locate with the reader pod so we can hostPath-share its
      # /dev/shm/mxl-domain-reader tmpfs (provisioned in mxl-dmf-terraform via
      # k8s/base/reader-deployment.yaml). The reader pod has its own
      # podAntiAffinity against the writer, so this transitively pins us to the
      # reader's node, which is necessarily distinct from the writer's node.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: reader-media-function-efa
              topologyKey: kubernetes.io/hostname
      # mediamtx-mxl is published as a private GHCR package. PAT lives in
      # AWS SM; ESO renders demo-app-ghcr-pull (see ghcr-pull-secret.yaml).
      imagePullSecrets:
        - name: demo-app-ghcr-pull
      containers:
        - name: mediamtx
          # Upstream image now built + pushed by qvest-digital/mediamtx CI on
          # the feature/mxl-static-source branch (workflow: mxl-image.yml).
          # No more local Dockerfile here — this repo only renders manifests.
          image: ghcr.io/qvest-digital/mxl-dmf-demo-app/mediamtx-mxl:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8888
              name: hls
            - containerPort: 8889
              name: webrtc
          volumeMounts:
            - name: config
              mountPath: /mediamtx.yml
              subPath: mediamtx.yml
            - name: mxl-domain
              mountPath: /domain
              # Mounted read-write because libmxl's reader-side acquires a
              # session slot in the flow's shared header (futex / atomics on
              # the mmap'd file). The reader-container in the reader pod
              # retains exclusive write access to the data payload via its
              # EFA-registered memory region; this mount only competes for
              # the reader-table portion of the shared header.
              readOnly: false
          livenessProbe:
            tcpSocket:
              port: 8888
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8888
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            # One ffmpeg libx264 subprocess per active MXL path. With 8 MXL
            # tiles (+ 1 SRT loop) all live at once, the worst case is 9
            # concurrent encoders. Idle mediamtx itself is ~125 Mi; each
            # ffmpeg child is ~400-600 Mi at 1080p with the ultrafast preset
            # the new mxl-stream-2..8 paths use. Headroom past 9 × 600 Mi
            # to absorb spikes during muxer restarts.
            requests:
              cpu: "2"
              memory: 2Gi
            limits:
              cpu: "10"
              memory: 8Gi

        # Caddy sidecar replaces the (now deleted) demo-app Go binary: serves
        # the multiviewer HTML at /, reverse-proxies HLS at /hls/* to mediamtx
        # on localhost, and rewrites mediamtx's cookieCheck 302 Location
        # headers so the browser stays on the public origin.
        - name: caddy
          image: caddy:2-alpine
          args: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: caddy-conf
              mountPath: /etc/caddy
              readOnly: true
            - name: caddy-www
              mountPath: /srv
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi

      volumes:
        - name: config
          configMap:
            name: mediamtx-config
        # Same physical tmpfs as the reader pod's /domain. Cross-pod sharing is
        # only possible because the reader pod uses hostPath (not emptyDir) for
        # its domain-volume — see mxl-dmf-terraform PR #122.
        - name: mxl-domain
          hostPath:
            path: /dev/shm/mxl-domain-reader
            type: DirectoryOrCreate
        - name: caddy-conf
          configMap:
            name: multiviewer
            items:
              - key: Caddyfile
                path: Caddyfile
        - name: caddy-www
          configMap:
            name: multiviewer
            items:
              - key: index.html
                path: index.html
