apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediamtx
  labels:
    app: mediamtx
    mxl.qvest-digital.com/role: consumer
spec:
  replicas: 1
  # Recreate: a rolling update would briefly run two pods against the same
  # hostPath MXL domain and the same published paths.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mediamtx
  template:
    metadata:
      labels:
        app: mediamtx
        # Role label drives the MxlReceiver podSelector. mediamtx-mxl
        # reads MXL flows directly via libmxl (mxl:///run/mxl/domain/...
        # static source), so it's a consumer too — sharing the same
        # mirrors the compositor uses on the same node.
        mxl.qvest-digital.com/role: consumer
    spec:
      # mediamtx is unpinned: it schedules anywhere and the gateway mirrors
      # each authorized flow into the node-local domain of every node that
      # runs a selected consumer pod, mediamtx and compositor alike.
      # Cross-node bridging is the mxl-k8s gateway's job, not these pods'.
      tolerations:
        - key: "vpc.amazonaws.com/efa"
          operator: "Exists"
          effect: "NoSchedule"
      # mediamtx-mxl is published as a private GHCR package. PAT lives
      # in AWS SM; ESO renders demo-app-ghcr-pull (see ghcr-pull-secret.yaml).
      imagePullSecrets:
        - name: demo-app-ghcr-pull
      initContainers:
        # Same shim as the compositor — mediamtx-mxl calls
        # mxlCreateFlowReader and would race the agent's mirror
        # materialization without it.
        - name: install-intent-shim
          # renovate: datasource=docker depName=ghcr.io/qvest-digital/mxl-k8s/shim
          image: ghcr.io/qvest-digital/mxl-k8s/shim:v1.0.0-rc.3
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: intent-shim
              mountPath: /shared
      containers:
        - name: mediamtx
          # Upstream image built + pushed by qvest-digital/mediamtx CI on
          # the feature/mxl-static-source branch (workflow: mxl-image.yml).
          # renovate: datasource=docker depName=ghcr.io/qvest-digital/mediamtx-mxl versioning=docker
          image: ghcr.io/qvest-digital/mediamtx-mxl:ecbae6487474ff7c5fab8970289a07403f78efdd
          imagePullPolicy: Always
          env:
            - name: LD_PRELOAD
              value: /opt/mxl-intent/libmxl-intent.so
          ports:
            - containerPort: 8888
              name: hls
            - containerPort: 8889
              name: webrtc
          securityContext:
            capabilities:
              add: ["IPC_LOCK", "SYS_RESOURCE"]
          volumeMounts:
            - name: config
              mountPath: /mediamtx.yml
              subPath: mediamtx.yml
            - name: mxl-domain
              mountPath: /run/mxl/domain
              readOnly: false
            - name: intent-shim
              mountPath: /opt/mxl-intent
              readOnly: true
            - name: agent-sock
              mountPath: /run/mxl/agent.sock
          livenessProbe:
            tcpSocket:
              port: 8888
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8888
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            # One ffmpeg libx264 subprocess per active MXL path. With
            # 8 MXL tiles (+1 SRT loop) all live at once, worst case is
            # 9 concurrent encoders. Idle mediamtx ~125 Mi; each ffmpeg
            # child ~400-600 Mi at 1080p with the ultrafast preset.
            requests:
              cpu: "2"
              memory: 2Gi
            limits:
              cpu: "10"
              memory: 8Gi

        # Caddy sidecar replaces the (now deleted) demo-app Go binary:
        # serves the multiviewer HTML at /, reverse-proxies HLS at
        # /hls/* to mediamtx on localhost, and rewrites mediamtx's
        # cookieCheck 302 Location headers so the browser stays on the
        # public origin.
        - name: caddy
          image: caddy:2-alpine
          args: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: caddy-conf
              mountPath: /etc/caddy
              readOnly: true
            - name: caddy-www
              mountPath: /srv
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi

      volumes:
        - name: config
          configMap:
            name: mediamtx-config
        # Per-node MXL domain shared with the mxl-k8s agent + gateway
        # DaemonSets via hostPath. The agent materializes mirrors here;
        # mediamtx-mxl's static source reads from this same path.
        - name: mxl-domain
          hostPath:
            path: /run/mxl/domain
            type: DirectoryOrCreate
        - name: intent-shim
          emptyDir: {}
        - name: agent-sock
          hostPath:
            path: /run/mxl/agent.sock
            type: Socket
        - name: caddy-conf
          configMap:
            name: multiviewer
            items:
              - key: Caddyfile
                path: Caddyfile
        - name: caddy-www
          configMap:
            name: multiviewer
            items:
              - key: index.html
                path: index.html
