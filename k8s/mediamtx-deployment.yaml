apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediamtx
  labels:
    app: mediamtx
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mediamtx
  template:
    metadata:
      labels:
        app: mediamtx
    spec:
      # No /domain hostPath, no podAffinity to the reader pod —
      # mediamtx is now downstream of the compositor, which uses
      # mxl-k8s's per-node agent + gateway to receive flow grains.
      # mediamtx only accepts the composite RTSP publish and re-mux
      # it as HLS for browsers.
      imagePullSecrets:
        - name: demo-app-ghcr-pull
      containers:
        - name: mediamtx
          image: ghcr.io/qvest-digital/mxl-dmf-demo-app/mediamtx-mxl:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8888
              name: hls
            - containerPort: 8889
              name: webrtc
            - containerPort: 8554
              name: rtsp
          volumeMounts:
            - name: config
              mountPath: /mediamtx.yml
              subPath: mediamtx.yml
          livenessProbe:
            tcpSocket:
              port: 8888
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8888
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            # Single HLS muxer for the composite stream. No more per-tile
            # MXL encoders running here, so the resource floor drops.
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi

        # Caddy sidecar serves the multiviewer HTML at /,
        # reverse-proxies HLS at /hls/* to mediamtx on localhost.
        - name: caddy
          image: caddy:2-alpine
          args: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: caddy-conf
              mountPath: /etc/caddy
              readOnly: true
            - name: caddy-www
              mountPath: /srv
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi

      volumes:
        - name: config
          configMap:
            name: mediamtx-config
        - name: caddy-conf
          configMap:
            name: multiviewer
            items:
              - key: Caddyfile
                path: Caddyfile
        - name: caddy-www
          configMap:
            name: multiviewer
            items:
              - key: index.html
                path: index.html
