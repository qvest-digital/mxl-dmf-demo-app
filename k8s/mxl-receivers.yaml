# Per-flow consumer intent for the mxl-k8s operator. Each MxlReceiver
# names one MXL flow UUID; the operator turns it into a MxlFlowMirror
# per (flow, target-node) and the gateway DaemonSet sets up the
# libmxl-fabrics handshake against the producer node.
#
# podSelector matches every Pod labelled mxl.qvest-digital.com/role=
# consumer — the compositor + mediamtx (co-located on one node, sharing
# a single mirror per flow).
#
# Multiviewer flows 1-4 == the four writer-mxl-{1..4} Deployments in
# writer-deployment.yaml == tiles MXL-1..4. provider here is the base
# (EKS/EFA) default; the sc overlay patches it to verbs for the on-prem
# RDMAoE fabric.
apiVersion: mxl.qvest-digital.com/v1alpha1
kind: MxlReceiver
metadata:
  name: mxl-multiviewer-1
spec:
  flowID: "d4d00000-0000-0000-0000-000000000001"
  provider: tcp
  podSelector:
    matchLabels:
      mxl.qvest-digital.com/role: consumer
---
apiVersion: mxl.qvest-digital.com/v1alpha1
kind: MxlReceiver
metadata:
  name: mxl-multiviewer-2
spec:
  flowID: "d4d00000-0000-0000-0000-000000000002"
  provider: tcp
  podSelector:
    matchLabels:
      mxl.qvest-digital.com/role: consumer
---
apiVersion: mxl.qvest-digital.com/v1alpha1
kind: MxlReceiver
metadata:
  name: mxl-multiviewer-3
spec:
  flowID: "d4d00000-0000-0000-0000-000000000003"
  provider: tcp
  podSelector:
    matchLabels:
      mxl.qvest-digital.com/role: consumer
---
# txDarwin output flow (produced by txdarwin-mxl-pipeline in
# mxl-dmf-txdarwin-flux). Consumed by txdarwin-output-viewer, which
# RTSP-publishes it to mediamtx path `txdarwin-out`. Orthogonal to the
# multiviewer; kept so the txdarwin demo path keeps working.
apiVersion: mxl.qvest-digital.com/v1alpha1
kind: MxlReceiver
metadata:
  name: txdarwin-output
spec:
  flowID: "c3000000-0000-0000-0000-000000000001"
  provider: tcp
  podSelector:
    matchLabels:
      mxl.qvest-digital.com/role: consumer
