# txDarwin output flow (produced by txdarwin-mxl-pipeline in
# mxl-dmf-txdarwin-flux). Consumed by txdarwin-output-viewer, which
# RTSP-publishes it to mediamtx path `txdarwin-out`.
apiVersion: mxl.qvest-digital.com/v1alpha1
kind: MxlReceiver
metadata:
  name: txdarwin-output
spec:
  flowID: "c3000000-0000-0000-0000-000000000001"
  provider: tcp
  podSelector:
    matchLabels:
      mxl.qvest-digital.com/role: consumer
---
# DMF-231 live SRT ingest flow (produced by the mxl-dmf-demo-srt-ingest
# bridge from a public SRT source). Consumed by mediamtx path `srt-camera`,
# which serves it at /hls/srt-camera. Without this intent the mxl-k8s
# intent-shim blocks mediamtx's open of the flow.
apiVersion: mxl.qvest-digital.com/v1alpha1
kind: MxlReceiver
metadata:
  name: srt-ingest-b2000000
spec:
  flowID: "b2000000-0000-0000-0000-000000000001"
  provider: tcp
  podSelector:
    matchLabels:
      mxl.qvest-digital.com/role: consumer
