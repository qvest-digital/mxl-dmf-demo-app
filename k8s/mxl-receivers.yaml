# Nine MxlReceiver CRDs — one per flow the compositor consumes.
# The mxl-k8s operator picks each up, materializes one MxlFlowMirror
# per (flow, target-node), and the per-node gateway DaemonSet bridges
# grains from the writer node to the compositor's node over EFA.
#
# podSelector matches the compositor Deployment by role label so each
# receiver follows the pod across restarts without needing a static
# Pod UID.
---
apiVersion: mxl.qvest-digital.com/v1alpha1
kind: MxlReceiver
metadata:
  name: composite-mxl-1
spec:
  flowID: "5fbec3b1-1b0f-417d-9059-8b94a47197ed"
  provider: verbs
  podSelector:
    matchLabels:
      mxl-k8s-demo.qvest-digital.com/role: consumer
---
