# Per-flow consumer intent for the mxl-k8s operator. Each MxlReceiver
# names one MXL flow UUID; the operator turns it into a MxlFlowMirror
# per (flow, target-node) and the gateway DaemonSet sets up the
# libmxl-fabrics handshake against the producer node.
#
# podSelector matches every Pod labelled
# mxl.qvest-digital.com/role=consumer in the default namespace —
# currently that's the compositor + mediamtx (both co-located on the
# same node, so they share a single mirror per flow).
#
# Producer side: writer-media-function-efa in mxl-dmf-terraform's
# k8s/base/writer-deployment.yaml, label
# mxl.qvest-digital.com/role=producer.
apiVersion: mxl.qvest-digital.com/v1alpha1
kind: MxlReceiver
metadata:
  name: mxl-stream-native
spec:
  flowID: "5fbec3b1-1b0f-417d-9059-8b94a47197ed"
  provider: tcp
  podSelector:
    matchLabels:
      mxl.qvest-digital.com/role: consumer
---
apiVersion: mxl.qvest-digital.com/v1alpha1
kind: MxlReceiver
metadata:
