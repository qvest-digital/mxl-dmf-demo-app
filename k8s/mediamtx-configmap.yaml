apiVersion: v1
kind: ConfigMap
metadata:
  name: mediamtx-config
  labels:
    app: mediamtx
data:
  mediamtx.yml: |
    logLevel: info

    webrtc: true
    webrtcAddress: :8889

    hls: true
    hlsAddress: :8888
    hlsAlwaysRemux: true
    hlsVariant: lowLatency
    # Tight muxer state so clients land near the live edge. Default
    # hlsSegmentCount=7 with ~1s segments meant up to 7s of stale
    # segments could be served first; combined with ffmpeg back-pressure
    # on the native path that produced visible multi-minute drift between
    # the two MXL tiles. Keep just enough history for HLS-LL part
    # rewind without trapping the player in the past.
    # hlsVariant: lowLatency mandates hlsSegmentCount >= 7. Keep at the
    # minimum + short segments so playlist history stays small and clients
    # land near the live edge. Player-side aggressive follow lives in the
    # hls.js init in multiviewer-configmap.yaml.
    hlsSegmentCount: 7
    hlsSegmentDuration: 1s
    hlsPartDuration: 200ms

    rtsp: false
    rtmp: false
    srt: true
    srtAddress: :8890

    paths:
      # Existing path: pulls H.264-over-SRT from the reader pod's
      # `mxl-gst-sink` (encoded by the reader-container from MXL grains).
      # Kept so the showcase can demonstrate the original SRT-bridge pipeline
      # side-by-side with the native one below.
      mxl-stream:
        source: srt://reader-media-service:5000?mode=caller
        sourceOnDemand: true

      # New path: mediamtx reads MXL grains zero-copy from the same /domain
      # tmpfs the reader-container fills via EFA RDMA. This is the integration
      # test for the upstream PR qvest-digital/mediamtx#1 (MXL static source).
      mxl-stream-native:
        source: mxl:///domain/5fbec3b1-1b0f-417d-9059-8b94a47197ed
        # Keep the libmxl reader + ffmpeg encoder running 24/7. With
        # sourceOnDemand=true, the first viewer paid ~1-2s of cold-start
        # latency on every transition from idle to active: libx264 init +
        # filling the first GOP + draining the stdin/stdout pipes. Costs
        # one mostly-busy CPU + ~500 Mi RAM continuously, which is fine
        # for this single-pod demo and matches the SRT-bridge path which
        # is always-on by virtue of mxl-gst-sink running in the reader pod.
        sourceOnDemand: false
        mxlH264Preset: veryfast
        mxlH264Profile: high
        mxlH264Bitrate: 5000000

      # 24/7 broadcast-style loop of Sintel (Blender Foundation, CC-BY 3.0).
      # Source MP4 cached from an S3 bucket on first pod start; ffmpeg adds a
      # channel logo + clock overlay before pushing to mediamtx over SRT.
      sintel:
        source: srt://loop-sintel:9000?mode=caller
        sourceOnDemand: true

      # 24/7 broadcast-style loops of FrOSCon 2024 talks (CC-BY,
      # media.ccc.de). Source MP4s cached from S3 on first pod start.
      froscon-1:
        source: srt://loop-froscon-1:9000?mode=caller
        sourceOnDemand: true

      froscon-2:
        source: srt://loop-froscon-2:9000?mode=caller
        sourceOnDemand: true
