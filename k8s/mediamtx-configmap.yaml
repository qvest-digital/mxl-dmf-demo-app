apiVersion: v1
kind: ConfigMap
metadata:
  name: mediamtx-config
  labels:
    app: mediamtx
data:
  mediamtx.yml: |
    logLevel: info

    # WebRTC
    webrtc: true
    webrtcAddress: :8889

    # HLS
    hls: true
    hlsAddress: :8888
    hlsAlwaysRemux: true
    hlsVariant: lowLatency

    # Disable unused protocols
    rtsp: true
    rtspAddress: :8554
    rtmp: false
    srt: true
    srtAddress: :8890

    paths:
      mxl-raw:
        source: srt://reader-media-service:5000?mode=caller
        sourceOnDemand: true

      mxl-stream:
        source: publisher
        sourceOnDemand: true
        runOnDemand: >-
          ffmpeg -i rtsp://localhost:8554/mxl-raw
          -c:v copy -bsf:v dump_extra
          -f rtsp rtsp://localhost:8554/mxl-stream
        runOnDemandCloseAfter: 10s
