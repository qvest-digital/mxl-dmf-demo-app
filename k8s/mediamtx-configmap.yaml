apiVersion: v1
kind: ConfigMap
metadata:
  name: mediamtx-config
  labels:
    app: mediamtx
data:
  mediamtx.yml: |
    logLevel: info

    webrtc: true
    webrtcAddress: :8889

    hls: true
    hlsAddress: :8888
    hlsAlwaysRemux: true
    hlsVariant: lowLatency

    rtsp: false
    rtmp: false
    srt: true
    srtAddress: :8890

    paths:
      # Existing path: pulls H.264-over-SRT from the reader pod's
      # `mxl-gst-sink` (encoded by the reader-container from MXL grains).
      # Kept so the showcase can demonstrate the original SRT-bridge pipeline
      # side-by-side with the native one below.
      mxl-stream:
        source: srt://reader-media-service:5000?mode=caller
        sourceOnDemand: true

      # New path: mediamtx reads MXL grains zero-copy from the same /domain
      # tmpfs the reader-container fills via EFA RDMA. This is the integration
      # test for the upstream PR qvest-digital/mediamtx#1 (MXL static source).
      mxl-stream-native:
        source: mxl:///domain/5fbec3b1-1b0f-417d-9059-8b94a47197ed
        sourceOnDemand: true
        mxlH264Preset: veryfast
        mxlH264Profile: high
        mxlH264Bitrate: 5000000

      ball:
        source: srt://testsrc-ball:9000?mode=caller
        sourceOnDemand: true

      snow:
        source: srt://testsrc-snow:9000?mode=caller
        sourceOnDemand: true

      # 24/7 broadcast-style loop of Sintel (Blender Foundation, CC-BY 3.0).
      # Source MP4 cached from an S3 bucket on first pod start; ffmpeg adds a
      # channel logo + clock overlay before pushing to mediamtx over SRT.
      sintel:
        source: srt://loop-sintel:9000?mode=caller
        sourceOnDemand: true
