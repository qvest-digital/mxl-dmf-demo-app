apiVersion: v1
kind: ConfigMap
metadata:
  name: mediamtx-config
  labels:
    app: mediamtx
data:
  mediamtx.yml: |
    logLevel: info

    webrtc: true
    webrtcAddress: :8889

    hls: true
    hlsAddress: :8888
    hlsAlwaysRemux: true
    hlsVariant: lowLatency

    rtsp: false
    rtmp: false
    srt: true
    srtAddress: :8890

    paths:
      mxl-stream:
        source: srt://reader-media-service:5000?mode=caller
        sourceOnDemand: true

      smpte:
        source: srt://testsrc-smpte:9000?mode=caller
        sourceOnDemand: true

      ball:
        source: srt://testsrc-ball:9000?mode=caller
        sourceOnDemand: true

      snow:
        source: srt://testsrc-snow:9000?mode=caller
        sourceOnDemand: true
