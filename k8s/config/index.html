<!DOCTYPE html>
<html>
<head>
<title>MXL DMF COMPOSITE</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #000; color: #ccc; font-family: Arial, "Helvetica Neue", Helvetica, sans-serif; font-size: 11px; overflow: hidden; }
  #bar { height: 22px; background: #0a0a0a; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; padding: 0 8px; text-transform: uppercase; letter-spacing: 1px; color: #888; }
  #bar .m { display: flex; gap: 14px; color: #aaa; }
  #bar .m span b { color: #00cc00; }
  #bar .m span.warn b { color: #ffaa00; }
  #bar .m span.bad  b { color: #ff3030; }
  #bar .brand { display: flex; align-items: center; gap: 14px; }
  #src { display: flex; gap: 6px; }
  #src button { background: #111; color: #888; border: 1px solid #333; font: inherit; text-transform: uppercase; letter-spacing: 1px; padding: 1px 8px; cursor: pointer; }
  #src button.active { color: #00ff00; border-color: #00cc00; }
  #stage { position: absolute; top: 22px; left: 0; right: 0; bottom: 0; background: #000; display: flex; align-items: center; justify-content: center; }
  #stage video { width: 100%; height: 100%; background: #000; object-fit: contain; }
</style>
</head>
<body>
  <div id="bar">
    <div class="brand">
      <span>MXL DMF COMPOSITE</span>
      <div id="src">
        <button data-path="composite" class="active">Composite</button>
        <button data-path="txdarwin-out">txDarwin Out</button>
      </div>
    </div>
    <div class="m">
      <span>HLS LAG <b id="hls-lag">--</b> ms</span>
      <span>STATE <b id="state">CONN</b></span>
    </div>
    <div><span id="clk">--:--:--</span></div>
  </div>
  <div id="stage">
    <video id="v" muted autoplay playsinline></video>
  </div>

  <script>
    var clk = document.getElementById('clk');
    var lagEl = document.getElementById('hls-lag');
    var stEl = document.getElementById('state');
    var video = document.getElementById('v');

    function pad(n){ return n<10 ? '0'+n : ''+n; }
    function tick(){
      var d = new Date();
      clk.textContent = pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
    }
    setInterval(tick, 250); tick();

    // Active stream path under /hls/<path>/index.m3u8. Switchable between the
    // 9-flow composite and the txDarwin output via the source buttons.
    var currentPath = 'composite';
    function srcUrl(){ return '/hls/' + currentPath + '/index.m3u8'; }

    if (Hls.isSupported()) {
      var frags = {};
      function rememberFrag(f){
        if (f.programDateTime == null) return;
        frags[f.sn] = { pdt: f.programDateTime, start: f.start, dur: f.duration };
        var keys = Object.keys(frags);
        if (keys.length > 8) {
          keys.sort(function(a,b){ return +a - +b; });
          delete frags[keys[0]];
        }
      }
      var hls = new Hls({ liveSyncDurationCount: 1, liveMaxLatencyDurationCount: 2, enableWorker: true, lowLatencyMode: true });
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function(){ stEl.textContent = 'LIVE'; stEl.style.color = '#00ff00'; video.play(); });
      hls.on(Hls.Events.LEVEL_LOADED, function(ev, data){ if (data.details && data.details.fragments) data.details.fragments.forEach(rememberFrag); });
      hls.on(Hls.Events.FRAG_LOADED, function(ev, data){ rememberFrag(data.frag); });
      hls.on(Hls.Events.ERROR, function(ev, data){
        if (!data.fatal) return;
        stEl.textContent = 'OFF'; stEl.style.color = '#ff3030';
        setTimeout(function(){
          stEl.textContent = 'CONN'; stEl.style.color = '#ffaa00';
          hls.loadSource(srcUrl());
        }, 5000);
      });

      function loadCurrent(){
        frags = {};
        lagEl.textContent = '--';
        stEl.textContent = 'CONN'; stEl.style.color = '#ffaa00';
        hls.loadSource(srcUrl());
      }
      loadCurrent();

      // Source toggle: switch the single player between the available
      // mediamtx HLS paths without reloading the page.
      document.querySelectorAll('#src button').forEach(function(btn){
        btn.addEventListener('click', function(){
          var path = btn.getAttribute('data-path');
          if (path === currentPath) return;
          currentPath = path;
          document.querySelectorAll('#src button').forEach(function(b){ b.classList.remove('active'); });
          btn.classList.add('active');
          loadCurrent();
        });
      });

      // HLS+player lag. Same PDT trick as the old grid: subtract the
      // wall-clock at which the visible frame was muxed from Date.now().
      // This is the delta between the burned-in clock on the picture and
      // the bar clock above — visible to the eye as a sanity check.
      setInterval(function(){
        if (video.readyState < 2) return;
        var ct = video.currentTime;
        var match = null;
        for (var k in frags) { var f = frags[k]; if (ct >= f.start && ct < f.start + f.dur) { match = f; break; } }
        if (!match) return;
        var lag = Date.now() - (match.pdt + (ct - match.start) * 1000);
        if (lag < 0 || lag > 60000) return;
        lagEl.textContent = lag.toFixed(0);
        lagEl.parentElement.className = (lag < 2500 ? '' : (lag < 6000 ? 'warn' : 'bad'));
      }, 250);
    }
  </script>
</body>
</html>
