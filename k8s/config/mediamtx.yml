logLevel: info

webrtc: true
webrtcAddress: :8889

hls: true
hlsAddress: :8888
hlsAlwaysRemux: true
hlsVariant: lowLatency
# Tight muxer state so clients land near the live edge.
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms

rtsp: true
rtspAddress: :8554
rtmp: false
srt: true
srtAddress: :8890

paths:
  # Compositor sink. The composite pod (mxl-multi-compositor) reads
  # nine MXL flows from /run/mxl/domain via libmxl, builds a 3x3
  # mosaic, encodes once with x264, pushes the result here as an
  # RTSP publisher. The multiviewer landing page plays
  # /hls/composite/index.m3u8 — that's the single demo URL.
  composite: {}
