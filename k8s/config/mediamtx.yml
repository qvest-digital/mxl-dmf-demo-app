logLevel: info

webrtc: true
webrtcAddress: :8889

hls: true
hlsAddress: :8888
hlsAlwaysRemux: true
hlsVariant: lowLatency
# Tight muxer state so clients land near the live edge. Default
# hlsSegmentCount=7 with ~1s segments meant up to 7s of stale
# segments could be served first; combined with ffmpeg back-pressure
# on the native path that produced visible multi-minute drift between
# the two MXL tiles. Keep just enough history for HLS-LL part
# rewind without trapping the player in the past.
# hlsVariant: lowLatency mandates hlsSegmentCount >= 7. Keep at the
# minimum + short segments so playlist history stays small and clients
# land near the live edge. Player-side aggressive follow lives in the
# hls.js init in config/index.html.
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms

rtsp: true
rtspAddress: :8554
rtmp: false
srt: true
srtAddress: :8890

paths:
  # mediamtx reads MXL grains zero-copy from the same /domain
  # tmpfs the reader-container fills via EFA RDMA. This is the integration
  # test for the upstream PR qvest-digital/mediamtx#1 (MXL static source).
  #
  # Eight MXL paths corresponding to the eight UUIDs in the reader/writer
  # deployments' MXL_FLOW_IDS env var. The first one is the legacy
  # single-flow demo (kept always-on); the others are added for the 8-tile
  # MXL showcase and stay on-demand so they don't burn CPU until a viewer
  # actually requests them — and so they fail closed (404 → tile OFFLINE)
  # in the window before the terraform-managed reader/writer pods are
  # updated to multi-flow mode.
  mxl-stream-native:
    source: mxl:///domain/5fbec3b1-1b0f-417d-9059-8b94a47197ed
    # Keep the libmxl reader + ffmpeg encoder running 24/7. With
    # sourceOnDemand=true, the first viewer paid ~1-2s of cold-start
    # latency on every transition from idle to active: libx264 init +
    # filling the first GOP + draining the stdin/stdout pipes.
    sourceOnDemand: false
    mxlH264Preset: veryfast
    mxlH264Profile: high
    mxlH264Bitrate: 5000000

  mxl-stream-2:
    source: mxl:///domain/a1000000-0000-0000-0000-000000000001
    sourceOnDemand: true
    mxlH264Preset: ultrafast
    mxlH264Profile: high
    mxlH264Bitrate: 3000000

  mxl-stream-3:
    source: mxl:///domain/a1000000-0000-0000-0000-000000000002
    sourceOnDemand: true
    mxlH264Preset: ultrafast
    mxlH264Profile: high
    mxlH264Bitrate: 3000000

  mxl-stream-4:
    source: mxl:///domain/a1000000-0000-0000-0000-000000000003
    sourceOnDemand: true
    mxlH264Preset: ultrafast
    mxlH264Profile: high
    mxlH264Bitrate: 3000000

  mxl-stream-5:
    source: mxl:///domain/a1000000-0000-0000-0000-000000000004
    sourceOnDemand: true
    mxlH264Preset: ultrafast
    mxlH264Profile: high
    mxlH264Bitrate: 3000000

  mxl-stream-6:
    source: mxl:///domain/a1000000-0000-0000-0000-000000000005
    sourceOnDemand: true
    mxlH264Preset: ultrafast
    mxlH264Profile: high
    mxlH264Bitrate: 3000000

  mxl-stream-7:
    source: mxl:///domain/a1000000-0000-0000-0000-000000000006
    sourceOnDemand: true
    mxlH264Preset: ultrafast
    mxlH264Profile: high
    mxlH264Bitrate: 3000000

  mxl-stream-8:
    source: mxl:///domain/a1000000-0000-0000-0000-000000000007
    sourceOnDemand: true
    mxlH264Preset: ultrafast
    mxlH264Profile: high
    mxlH264Bitrate: 3000000

  # SRT-bridge baseline: Sintel (Blender Foundation, CC-BY 3.0) looped via
  # ffmpeg → SRT → mediamtx. Kept as the comparison reference for the
  # MXL-vs-SRT latency story in the multiviewer DRIFT readout — pulling
  # this would erase the only non-MXL tile and leave the metric without a
  # control group.
  sintel:
    source: srt://loop-sintel:9000?mode=caller
    sourceOnDemand: true

  # Compositor sink. The composite pod (ffmpeg in k8s/composite-deployment.yaml)
  # pulls all nine tile paths back via SRT, builds a 3x3 mosaic with burned-in
  # tile labels + global clock, and pushes the mosaic here. No source: line =
  # publisher-mode path, ready to receive an SRT/RTSP/RTMP/WebRTC publisher.
  # The multiviewer landing page plays /hls/composite/index.m3u8 directly so
  # the demo is one shareable URL with no per-tile JS player pool.
  composite: {}
