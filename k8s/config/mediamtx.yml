logLevel: info

webrtc: true
webrtcAddress: :8889
# ICE media goes over a dedicated UDP mux port, exposed via its own
# LoadBalancer (mediamtx-webrtc-udp.yaml). webrtcAdditionalHosts is that
# LB's IP, advertised as mediamtx's ICE candidate so the browser reaches the
# RTP directly. NOTE: 10.20.53.107 is the sc/MetalLB (internal) IP; a public
# cluster needs its own external IP here.
webrtcLocalUDPAddress: :8189
# Both clusters' ICE hosts. mediamtx advertises both as candidates; each
# browser reaches only its own (sc client -> 10.20.53.107 internal; EKS client
# -> the public NLB behind webrtc.demo.dmf) and ICE ignores the unreachable one.
webrtcAdditionalHosts: [10.20.53.107, webrtc.demo.dmf.qvest-digital.com]
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

hls: true
hlsAddress: :8888
hlsAlwaysRemux: true
# Standard MPEG-TS HLS, NOT low-latency. LL-HLS (parts, hlsPartDuration)
# combined with hls.js edge-chasing made the player micro-rewind — it
# re-displayed already-shown frames, so the burned-in clock appeared to
# flap backward even though the encoded stream is strictly monotonic
# (verified: ffmpeg decodes the segments in order). Classic segmented HLS
# plays smoothly and monotonically at the cost of a few seconds of
# latency, which is fine for a multiviewer.
hlsVariant: mpegts
hlsSegmentCount: 7
hlsSegmentDuration: 1s

rtsp: true
rtspAddress: :8554
rtmp: false
srt: true
srtAddress: :8890

paths:
  # mediamtx reads MXL grains zero-copy from /run/mxl/domain. The
  # mxl-k8s gateway DaemonSet materializes the per-flow mirror at that
  # path on this node; the producer side runs on a different node and
  # writes into its own /run/mxl/domain — the gateway bridges them.
  #
  # Four on-demand MXL paths, one per multiviewer flow (a1..0001-0004 ==
  # tiles MXL-1..4). On-demand so single-tile inspection is possible
  # without burning encoder CPU until a viewer actually requests a tile;
  # the multiviewer page itself plays the pre-composited mosaic
  # (/hls/composite) and never touches these.
  mxl-1:
    source: mxl:///run/mxl/domain/d4d00000-0000-0000-0000-000000000001
    sourceOnDemand: false
    mxlH264Preset: ultrafast
    mxlH264Profile: high
    mxlH264Bitrate: 3000000
    # Force a 1s IDR/keyframe period so the HLS segmenter always has a
    # keyframe to cut a 1s segment on. Without it, high-complexity content
    # (the snow pattern: incompressible full-frame noise) defers IDRs and the
    # HLS muxer can't form segments -> index.m3u8 returns HTTP 500. Low-motion
    # patterns (bars, ball) happened to emit IDRs often enough to work.
    mxlH264IDRPeriod: 30

  mxl-2:
    source: mxl:///run/mxl/domain/d4d00000-0000-0000-0000-000000000002
    sourceOnDemand: false
    mxlH264Preset: ultrafast
    mxlH264Profile: high
    mxlH264Bitrate: 3000000
    mxlH264IDRPeriod: 30

  mxl-3:
    source: mxl:///run/mxl/domain/d4d00000-0000-0000-0000-000000000003
    sourceOnDemand: false
    mxlH264Preset: ultrafast
    mxlH264Profile: high
    mxlH264Bitrate: 3000000
    # Force a 1s IDR/keyframe period so the HLS segmenter always has a
    # keyframe to cut a 1s segment on. Without it, high-complexity content
    # (the snow pattern: incompressible full-frame noise) defers IDRs and the
    # HLS muxer can't form segments -> index.m3u8 returns HTTP 500. Low-motion
    # patterns (bars, ball) happened to emit IDRs often enough to work.
    mxlH264IDRPeriod: 30

  mxl-4:
    source: mxl:///run/mxl/domain/d4d00000-0000-0000-0000-000000000004
    sourceOnDemand: false
    mxlH264Preset: ultrafast
    mxlH264Profile: high
    mxlH264Bitrate: 3000000
    # Force a 1s IDR/keyframe period so the HLS segmenter always has a
    # keyframe to cut a 1s segment on. Without it, high-complexity content
    # (the snow pattern: incompressible full-frame noise) defers IDRs and the
    # HLS muxer can't form segments -> index.m3u8 returns HTTP 500. Low-motion
    # patterns (bars, ball) happened to emit IDRs often enough to work.
    mxlH264IDRPeriod: 30

  # Compositor sink. The composite pod (k8s/composite-deployment.yaml)
  # reads the four MXL flows zero-copy, builds the 2x2 mosaic with
  # burned-in tile labels + global clock, and pushes the mosaic here.
  # No source: line = publisher-mode path. The multiviewer landing page
  # plays /hls/composite/index.m3u8 directly so the demo is one
  # shareable URL.
  composite: {}

  # txDarwin output. Publisher-mode (no source: line) — the
  # txdarwin-output-viewer pod (k8s/txdarwin-output-viewer.yaml) reads MXL
  # flow c3000000 and RTSP-publishes the encoded result here. Played at
  # /hls/txdarwin-out/index.m3u8 (UI source toggle in config/index.html).
  txdarwin-out: {}

  # DMF-231 live SRT ingest. The mxl-dmf-demo-srt-ingest bridge ingests a
  # public SRT stream (srt-ingest.dmf.qvest-digital.com:9000) and writes MXL
  # flow b2000000. mediamtx reads it zero-copy and serves /hls/srt-camera.
  # Needs the matching MxlReceiver in mxl-receivers.yaml so the mxl-k8s
  # intent-shim lets mediamtx open the flow. sourceOnDemand must be false:
  # with hlsAlwaysRemux:true (above) mediamtx does NOT start an on-demand
  # source from an HLS request, so an on-demand srt-camera never comes online
  # (same reason mxl-stream-native is always-on). When the camera isn't
  # streaming the MXL reader just logs "flow not found" and retries — harmless.
  # DMF-298/303 showcase: output of the per-booking txDarwin instance
  # named "ac3demo". The deploy workflow derives writer flow ids
  # deterministically (c3…-shasum(name)[0:12]), so this id is stable for
  # that instance name across re-deploys. Baseline profile for WebRTC,
  # same reasoning as srt-camera.
  txdarwin-ac3demo-out:
    source: mxl:///run/mxl/domain/c3000000-0000-0000-0000-9d18249f84f4
    sourceOnDemand: false
    mxlH264Preset: ultrafast
    mxlH264Profile: baseline
    mxlH264Bitrate: 5000000
    mxlH264IDRPeriod: 30

  srt-camera:
    source: mxl:///run/mxl/domain/b2000000-0000-0000-0000-000000000001
    sourceOnDemand: false
    # Baseline profile (like the mxl-1..4 tiles, avc1.42..) so browser WebRTC
    # decoders can render it. Main/High H264 connects over WHEP but renders black,
    # forcing the HLS fallback and its multi-second lag. srt-camera is the live
    # ingest where sub-second WebRTC latency is the whole point, so it must be
    # baseline. ultrafast disables CABAC/8x8dct -> Constrained Baseline output.
    mxlH264Preset: ultrafast
    mxlH264Profile: baseline
    mxlH264Bitrate: 5000000
