logLevel: info

webrtc: true
webrtcAddress: :8889

hls: true
hlsAddress: :8888
hlsAlwaysRemux: true
hlsVariant: lowLatency
# Tight muxer state so clients land near the live edge. Default
# hlsSegmentCount=7 with ~1s segments meant up to 7s of stale
# segments could be served first; combined with ffmpeg back-pressure
# on the native path that produced visible multi-minute drift between
# the two MXL tiles. Keep just enough history for HLS-LL part
# rewind without trapping the player in the past.
# hlsVariant: lowLatency mandates hlsSegmentCount >= 7. Keep at the
# minimum + short segments so playlist history stays small and clients
# land near the live edge. Player-side aggressive follow lives in the
# hls.js init in config/index.html.
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms

rtsp: true
rtspAddress: :8554
rtmp: false
srt: true
srtAddress: :8890

paths:
  # mediamtx reads MXL grains zero-copy from /run/mxl/domain. The
  # mxl-k8s gateway DaemonSet materializes the per-flow mirror at that
  # path on this node; the producer side runs on a different node and
  # writes into its own /run/mxl/domain — the gateway bridges them.
  #
  # Four on-demand MXL paths, one per multiviewer flow (a1..0001-0004 ==
  # tiles MXL-1..4). On-demand so single-tile inspection is possible
  # without burning encoder CPU until a viewer actually requests a tile;
  # the multiviewer page itself plays the pre-composited mosaic
  # (/hls/composite) and never touches these.
  mxl-1:
    source: mxl:///run/mxl/domain/a1000000-0000-0000-0000-000000000001
    sourceOnDemand: true
    mxlH264Preset: ultrafast
    mxlH264Profile: high
    mxlH264Bitrate: 3000000

  mxl-2:
    source: mxl:///run/mxl/domain/a1000000-0000-0000-0000-000000000002
    sourceOnDemand: true
    mxlH264Preset: ultrafast
    mxlH264Profile: high
    mxlH264Bitrate: 3000000

  mxl-3:
    source: mxl:///run/mxl/domain/a1000000-0000-0000-0000-000000000003
    sourceOnDemand: true
    mxlH264Preset: ultrafast
    mxlH264Profile: high
    mxlH264Bitrate: 3000000

  mxl-4:
    source: mxl:///run/mxl/domain/a1000000-0000-0000-0000-000000000004
    sourceOnDemand: true
    mxlH264Preset: ultrafast
    mxlH264Profile: high
    mxlH264Bitrate: 3000000

  # Compositor sink. The composite pod (k8s/composite-deployment.yaml)
  # reads the four MXL flows zero-copy, builds the 2x2 mosaic with
  # burned-in tile labels + global clock, and pushes the mosaic here.
  # No source: line = publisher-mode path. The multiviewer landing page
  # plays /hls/composite/index.m3u8 directly so the demo is one
  # shareable URL.
  composite: {}

  # txDarwin output. Publisher-mode (no source: line) — the
  # txdarwin-output-viewer pod (k8s/txdarwin-output-viewer.yaml) reads MXL
  # flow c3000000 and RTSP-publishes the encoded result here. Played at
  # /hls/txdarwin-out/index.m3u8 (UI source toggle in config/index.html).
  txdarwin-out: {}
