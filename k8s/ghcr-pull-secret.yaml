---
# ESO pulls a GHCR PAT from AWS Secrets Manager and renders it as a
# kubernetes.io/dockerconfigjson Secret so kubelet can pull the private
# ghcr.io/qvest-digital/mediamtx-mxl image.
#
# AWS SM secret schema (single JSON value at mxl/dev/demo-app/ghcr-pat):
#   {"username":"<gh-user-or-org>","pat":"ghp_..."}
# PAT scope: read:packages. Create out-of-band:
#   aws secretsmanager create-secret \
#     --profile dmf-demo --region eu-central-1 \
#     --name mxl/dev/demo-app/ghcr-pat \
#     --secret-string '{"username":"...","pat":"ghp_..."}'
#
# IRSA on the ESO controller already allows mxl/dev/* (see terraform
# modules/external-secrets, secret_path_prefix=mxl/dev).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: default
spec:
  provider:
    aws:
      region: eu-central-1
      service: SecretsManager
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-app-ghcr-pull
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: aws-secretsmanager
  target:
    name: demo-app-ghcr-pull
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "ghcr.io": {
                "username": "{{ .username }}",
                "password": "{{ .pat }}",
                "auth": "{{ printf "%s:%s" .username .pat | b64enc }}"
              }
            }
          }
  data:
    - secretKey: username
      remoteRef:
        key: mxl/dev/demo-app/ghcr-pat
        property: username
    - secretKey: pat
      remoteRef:
        key: mxl/dev/demo-app/ghcr-pat
        property: pat
