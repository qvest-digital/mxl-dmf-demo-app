---
# Multi-flow MXL compositor — consumer side of the mxl-k8s control plane.
#
# Reads all nine MXL flows from /run/mxl/domain via libmxl (zero-copy,
# no per-flow decode pass), composites with a GStreamer compositor
# element, encodes the mosaic once with x264, pushes the result to
# mediamtx via RTSP.
#
# Where the flows come from:
#   - Writer pod (mxl-dmf-terraform) writes flows to /run/mxl/domain on
#     its node.
#   - mxl-k8s gateway DaemonSet bridges the flow grains across nodes
#     via libmxl-fabrics (EFA provider).
#   - mxl-k8s agent DaemonSet on this node materializes the mirror at
#     /run/mxl/domain, so this pod reads from local tmpfs.
#   - MxlReceiver CRs (mxl-receivers.yaml) express per-flow intent;
#     the operator reconciles them into MxlFlowMirror resources.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: composite
  labels:
    app: composite
    mxl.qvest-digital.com/role: consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: composite
  template:
    metadata:
      labels:
        app: composite
        # Role label drives the MxlReceiver podSelector + the writer
        # pod's podAntiAffinity so the gateway has to bridge two nodes.
        mxl.qvest-digital.com/role: consumer
    spec:
      # Must land on a different node than the producer so the
      # gateway's cross-node bridge actually fires.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  mxl.qvest-digital.com/role: producer
              topologyKey: kubernetes.io/hostname
      tolerations:
        - key: "vpc.amazonaws.com/efa"
          operator: "Exists"
          effect: "NoSchedule"
      imagePullSecrets:
        - name: demo-app-ghcr-pull
      initContainers:
        # Drops libmxl-intent.so onto the shared emptyDir so the main
        # container can LD_PRELOAD it. The shim makes the first
        # mxlCreateFlowReader call block on the agent's "flow available
        # locally" signal instead of failing with FLOW_NOT_FOUND when the
        # operator hasn't materialized the MxlFlowMirror yet.
        - name: install-intent-shim
          image: ghcr.io/qvest-digital/mxl-k8s/shim:v1.0.0-rc.3
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: intent-shim
              mountPath: /shared
      containers:
        - name: compositor
          image: ghcr.io/qvest-digital/mxl-dmf-demo-app/compositor:latest
          imagePullPolicy: Always
          env:
            - name: MXL_DOMAIN
              value: /run/mxl/domain
            - name: MXL_COMPOSITE_OUT
              value: rtsp://mediamtx:8554/composite
            # MXL_FLOW_IDS aligns with the MxlReceiver CRDs (one per
            # entry). Keep in sync with the writer's MXL_FLOW_IDS in
            # mxl-dmf-terraform.
            - name: MXL_FLOW_IDS
              value: >-
                5fbec3b1-1b0f-417d-9059-8b94a47197ed
                a1000000-0000-0000-0000-000000000001
                a1000000-0000-0000-0000-000000000002
                a1000000-0000-0000-0000-000000000003
                a1000000-0000-0000-0000-000000000004
                a1000000-0000-0000-0000-000000000005
                a1000000-0000-0000-0000-000000000006
                a1000000-0000-0000-0000-000000000007
                a1000000-0000-0000-0000-000000000008
            # Shim must be loaded before libmxl so the
            # mxlCreateFlowReader entry point gets intercepted.
            - name: LD_PRELOAD
              value: /opt/mxl-intent/libmxl-intent.so
          securityContext:
            # libmxl mlocks tmpfs grain pages on the reader side too;
            # without IPC_LOCK the verbs path fails to pin via ibv_reg_mr.
            capabilities:
              add: ["IPC_LOCK", "SYS_RESOURCE"]
          volumeMounts:
            - name: domain-volume
              mountPath: /run/mxl/domain
              # libmxl-side acquires a session slot in the flow's shared
              # header (futex/atomics) on attach; keep rw so the
              # reader-table mutation works.
              readOnly: false
            - name: intent-shim
              mountPath: /opt/mxl-intent
              readOnly: true
            # Unix socket the libmxl-intent.so shim uses to talk to the
            # agent DaemonSet on this node.
            - name: agent-sock
              mountPath: /run/mxl/agent.sock
          resources:
            # Worst-case mmap footprint per flow ≈ 40 MB; nine flows
            # plus gst pipeline buffers plus x264 working set fit in
            # ~2 Gi steady, 8 Gi covers keyframe bursts.
            requests:
              cpu: "2"
              memory: 2Gi
            limits:
              cpu: "8"
              memory: 8Gi
      volumes:
        # mxl-k8s agent + gateway DaemonSets share this same path. The
        # agent watches it via fanotify on the writer node and publishes
        # MxlFlow CRs; on the consumer node the gateway materializes the
        # mirror at this path.
        - name: domain-volume
          hostPath:
            path: /run/mxl/domain
            type: DirectoryOrCreate
        - name: intent-shim
          emptyDir: {}
        - name: agent-sock
          hostPath:
            path: /run/mxl/agent.sock
            type: Socket
