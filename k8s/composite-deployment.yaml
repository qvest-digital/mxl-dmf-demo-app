---
# Multi-flow MXL compositor. Replaces the previous ffmpeg-RTSP pull-9-tiles
# pod with a single process that reads all nine MXL flows directly from
# /dev/shm via libmxl (zero-copy, no per-flow decode pass), composites them
# with a GStreamer compositor element, encodes the mosaic once with x264,
# and pushes the result to mediamtx via RTSP.
#
# Why this matters: under the old design every flow was decoded out of
# mediamtx's HLS-bound H.264 encoder, and each path's encoder had its own
# backlog — that's what caused the per-tile burned-in clocks to disagree
# by seconds. Reading raw MXL grains directly bypasses all of that, so the
# clocks burned in by the writer pod (mxl-gst-testsrc's clockoverlay) reach
# the compositor with the same age across every flow. Spread shrinks from
# "seconds" (encoder backlog) to "microseconds" (EFA jitter + ring-buffer
# read position).
#
# Multiviewer landing page loads /hls/composite/index.m3u8 — nine tiles in
# a full 3x3 grid.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: composite
  labels:
    app: composite
spec:
  replicas: 1
  selector:
    matchLabels:
      app: composite
  template:
    metadata:
      labels:
        app: composite
    spec:
      # Co-located with mediamtx → reader → /dev/shm/mxl-domain-reader. The
      # hostPath mount below shares the exact same RDMA-backed tmpfs region
      # the reader-container writes into.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: reader-media-function-efa
              topologyKey: kubernetes.io/hostname
      tolerations:
        - key: "vpc.amazonaws.com/efa"
          operator: "Exists"
          effect: "NoSchedule"
      # GHCR image — same registry+auth as mediamtx-mxl, so reuse the
      # ExternalSecret-rendered secret.
      imagePullSecrets:
        - name: demo-app-ghcr-pull
      containers:
        - name: compositor
          image: ghcr.io/qvest-digital/mxl-dmf-demo-app/compositor:latest
          imagePullPolicy: Always
          env:
            - name: MXL_DOMAIN
              value: /domain
            - name: MXL_COMPOSITE_OUT
              value: rtsp://mediamtx:8554/composite
            # Nine flows fill the full 3x3 grid. Keep in sync with the
            # MXL_FLOW_IDS env on writer + reader deployments in
            # mxl-dmf-terraform — the reader is the source of truth for
            # the active flow set.
            - name: MXL_FLOW_IDS
              value: >-
                5fbec3b1-1b0f-417d-9059-8b94a47197ed
                a1000000-0000-0000-0000-000000000001
                a1000000-0000-0000-0000-000000000002
                a1000000-0000-0000-0000-000000000003
                a1000000-0000-0000-0000-000000000004
                a1000000-0000-0000-0000-000000000005
                a1000000-0000-0000-0000-000000000006
                a1000000-0000-0000-0000-000000000007
                a1000000-0000-0000-0000-000000000008
          volumeMounts:
            - name: domain-volume
              mountPath: /domain
              # Read-only; libmxl-side acquires a session slot in the flow's
              # shared header for atomics, but never writes payload bytes.
              # Match the mediamtx mount semantics (read-write there only so
              # libmxl's reader-table atomics work). Sticking with rw here
              # for the same reason — flip to false once libmxl gains an
              # explicit read-only reader API.
              readOnly: false
          resources:
            # Each MXL flow reader mmaps the entire grain ring (default
            # ring depth × ~5 MB per 1080p v210 grain ≈ 25-40 MB per
            # flow). Nine flows × 40 MB = ~360 MB just for the mmaps,
            # plus gst pipeline buffers (9 appsrcs queueing 2-3 raw
            # buffers each = another ~90 MB), plus x264's working
            # frames + the compositor canvas. 3 Gi tripped OOM almost
            # immediately. 8 Gi gives headroom for the worst-case
            # keyframe burst without leaving the node short.
            requests:
              cpu: "2"
              memory: 2Gi
            limits:
              cpu: "8"
              memory: 8Gi
      volumes:
        # Same physical tmpfs the reader-container writes into. hostPath
        # mount in reader-deployment.yaml + mediamtx-deployment.yaml gives
        # three pods on this node a shared view of /dev/shm/mxl-domain-reader.
        - name: domain-volume
          hostPath:
            path: /dev/shm/mxl-domain-reader
            type: DirectoryOrCreate
