---
# Multi-flow MXL compositor — consumer side of the mxl-k8s control plane.
#
# Reads the MXL flows listed in MXL_FLOW_IDS (currently four) from
# /run/mxl/domain via libmxl (zero-copy, no per-flow decode pass),
# composites with a GStreamer compositor element, encodes the mosaic once
# with x264, pushes the result to mediamtx via RTSP.
#
# Where the flows come from:
#   - Writer pods (writer-deployment.yaml) write flows to /run/mxl/domain
#     on their nodes.
#   - mxl-k8s gateway DaemonSet bridges the flow grains across nodes
#     via libmxl-fabrics (EFA provider).
#   - mxl-k8s agent DaemonSet on this node materializes the mirror at
#     /run/mxl/domain, so this pod reads from local tmpfs.
#   - The intent-shim reports each flow this pod opens; the mxl-k8s
#     agent creates the matching MxlReceiver and the operator
#     reconciles it into MxlFlowMirror resources.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: composite
  labels:
    app: composite
    mxl.qvest-digital.com/role: consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: composite
  template:
    metadata:
      labels:
        app: composite
        mxl.qvest-digital.com/role: consumer
    spec:
      tolerations:
        - key: "vpc.amazonaws.com/efa"
          operator: "Exists"
          effect: "NoSchedule"
      imagePullSecrets:
        - name: demo-app-ghcr-pull
      initContainers:
        # Drops libmxl-intent.so onto the shared emptyDir so the main
        # container can LD_PRELOAD it. The shim makes the first
        # mxlCreateFlowReader call block on the agent's "flow available
        # locally" signal instead of failing with FLOW_NOT_FOUND when the
        # operator hasn't materialized the MxlFlowMirror yet.
        - name: install-intent-shim
          # renovate: datasource=docker depName=ghcr.io/qvest-digital/mxl-k8s/shim
          image: ghcr.io/qvest-digital/mxl-k8s/shim:v1.0.0-rc.3
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: intent-shim
              mountPath: /shared
      containers:
        - name: compositor
          image: ghcr.io/qvest-digital/mxl-dmf-demo-app/compositor-mxlk8s:latest
          imagePullPolicy: Always
          env:
            - name: MXL_DOMAIN
              value: /run/mxl/domain
            - name: MXL_COMPOSITE_OUT
              value: rtsp://mediamtx:8554/composite
            # MXL_FLOW_IDS aligns 1:1 with the writer-mxl-{1..4}
            # Deployments. Four flows -> the compositor
            # lays out a 2x2 mosaic automatically (grid = ceil(sqrt(n))).
            - name: MXL_FLOW_IDS
              value: >-
                d4d00000-0000-0000-0000-000000000001
                d4d00000-0000-0000-0000-000000000002
                d4d00000-0000-0000-0000-000000000003
                d4d00000-0000-0000-0000-000000000004
            # Per-flow RDMA-delivery metrics endpoint the multiviewer
            # frontend polls (proxied by the caddy sidecar at /stats.json).
            - name: MXL_STATS_PORT
              value: "9090"
            # Grain geometry. The compositor defaults to 1920x1080; the flows
            # are 1296x720, so without this it wraps each v210 grain with the
            # wrong size -> "invalid video buffer" -> empty green tiles.
            - name: MXL_FRAME_WIDTH
              value: "1296"
            - name: MXL_FRAME_HEIGHT
              value: "720"
            # Shim must be loaded before libmxl so the
            # mxlCreateFlowReader entry point gets intercepted.
            - name: LD_PRELOAD
              value: /opt/mxl-intent/libmxl-intent.so
          ports:
            - name: stats
              containerPort: 9090
          securityContext:
            # libmxl mlocks tmpfs grain pages on the reader side too;
            # without IPC_LOCK the verbs path fails to pin via ibv_reg_mr.
            capabilities:
              add: ["IPC_LOCK", "SYS_RESOURCE"]
          volumeMounts:
            - name: domain-volume
              mountPath: /run/mxl/domain
              # libmxl-side acquires a session slot in the flow's shared
              # header (futex/atomics) on attach; keep rw so the
              # reader-table mutation works.
              readOnly: false
            - name: intent-shim
              mountPath: /opt/mxl-intent
              readOnly: true
            # Unix socket the libmxl-intent.so shim uses to talk to the
            # agent DaemonSet on this node.
            - name: agent-sock
              mountPath: /run/mxl/agent.sock
          resources:
            # Worst-case mmap footprint per flow ≈ 40 MB; four flows
            # plus gst pipeline buffers plus x264 working set fit in
            # ~2 Gi steady, 8 Gi covers keyframe bursts.
            requests:
              cpu: "2"
              memory: 2Gi
            limits:
              cpu: "8"
              memory: 8Gi
      volumes:
        # mxl-k8s agent + gateway DaemonSets share this same path. The
        # agent watches it via fanotify on the writer node and publishes
        # MxlFlow CRs; on the consumer node the gateway materializes the
        # mirror at this path.
        - name: domain-volume
          hostPath:
            path: /run/mxl/domain
            type: DirectoryOrCreate
        - name: intent-shim
          emptyDir: {}
        - name: agent-sock
          hostPath:
            path: /run/mxl/agent.sock
            type: Socket
