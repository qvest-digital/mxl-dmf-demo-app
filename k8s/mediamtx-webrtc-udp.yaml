---
# WebRTC ICE media path. mediamtx serves WHEP signaling over HTTP (proxied by
# caddy, port 8889) but the actual RTP flows over ICE/UDP — an L7 HTTP ingress
# can't carry that. Expose the ICE UDP mux port on its own LoadBalancer so the
# browser can reach it directly; webrtcAdditionalHosts in mediamtx.yml points
# at this IP so mediamtx advertises it as its ICE candidate.
#
# The IP is cluster-specific (sc/MetalLB internal 10.20.53.107). On a public
# cluster (EKS) this needs a UDP NLB + the public IP instead.
apiVersion: v1
kind: Service
metadata:
  name: mediamtx-webrtc-udp
  labels:
    app: mediamtx
  annotations:
    # sc / MetalLB: pin the internal IP.
    metallb.universe.tf/loadBalancerIPs: "10.20.53.107"
    # EKS: provision an internet-facing UDP NLB (MetalLB ignores these). A
    # stable DNS name via external-dns survives the nightly cluster rebuild
    # even though the NLB IP changes. hostname_suffix/cluster_domain are the
    # same per-environment substitution tokens httproute.yaml uses for the
    # app hostname itself — flat webrtc${hostname_suffix}.${cluster_domain},
    # a sibling of demo${hostname_suffix}.${cluster_domain} rather than a
    # child of it, so the same formula also resolves for consumers whose
    # cluster_domain is itself a dedicated subdomain (e.g. a bare-metal
    # cluster's own delegated zone) and not just dmf.qvest-digital.com.
    # Without the suffix, every EKS environment (dev, and every pr-env)
    # would claim this identical record, so only the last one to reconcile
    # would actually own it.
    external-dns.alpha.kubernetes.io/hostname: webrtc${hostname_suffix}.${cluster_domain}
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: mediamtx
  ports:
    - name: ice-udp
      protocol: UDP
      port: 8189
      targetPort: 8189
