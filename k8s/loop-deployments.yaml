---
# SRT-bridge baseline. The 8 MXL tiles in the multiviewer pull from
# mediamtx's mxl:// static source (cross-node EFA, libmxl zero-copy);
# this one tile pulls from the same mediamtx but via the SRT-bridge
# path, so the DRIFT readout in the multiviewer header has a non-MXL
# comparison point.
#
# Source MP4: Sintel (Blender Foundation, CC-BY 3.0), cached from the
# public S3 bucket mxl-dmf-demo-content-eu-central-1 on first pod
# start. ffmpeg loops it with a channel-bug + clock overlay and pushes
# MPEG-TS over SRT 9000 to mediamtx, which encodes to HLS for the
# multiviewer.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loop-sintel
  labels:
    app: loop-sintel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loop-sintel
  template:
    metadata:
      labels:
        app: loop-sintel
    spec:
      initContainers:
        - name: fetch-content
          image: curlimages/curl:8.10.1
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              FILE=/cache/sintel.mp4
              if [ -s "$FILE" ]; then
                echo "cached, skipping fetch"
                exit 0
              fi
              curl -fsSL -o "$FILE" \
                "https://mxl-dmf-demo-content-eu-central-1.s3.eu-central-1.amazonaws.com/sintel-1024-surround.mp4"
              echo "fetched $(wc -c < "$FILE") bytes"
          volumeMounts:
            - name: cache
              mountPath: /cache
      containers:
        - name: ffmpeg
          image: linuxserver/ffmpeg:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              exec ffmpeg -hide_banner -re -stream_loop -1 -i /cache/sintel.mp4 \
                -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2,drawtext=text='%{localtime\:%H\\\\\:%M\\\\\:%S}':x=20:y=20:fontsize=28:fontcolor=white:box=1:boxcolor=black@0.5,drawtext=text='SRT SINTEL':x=w-tw-20:y=20:fontsize=36:fontcolor=red:box=1:boxcolor=white@0.7" \
                -c:v libx264 -preset veryfast -tune zerolatency -g 60 -b:v 2500k -maxrate 2500k -bufsize 5000k \
                -c:a aac -b:a 128k -ac 2 \
                -f mpegts "srt://0.0.0.0:9000?mode=listener&latency=500"
          ports:
            - containerPort: 9000
              protocol: UDP
              name: srt
          volumeMounts:
            - name: cache
              mountPath: /cache
              readOnly: true
          resources:
            requests:
              cpu: 300m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: loop-sintel
  labels:
    app: loop-sintel
spec:
  type: ClusterIP
  selector:
    app: loop-sintel
  ports:
    - port: 9000
      targetPort: 9000
      protocol: UDP
      name: srt
